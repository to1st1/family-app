<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>العائلة السعيدة</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Midnight Bloom Palette */
  --night:   #0a0614;
  --deep:    #110920;
  --card:    #17102e;
  --glass:   rgba(255,255,255,.05);
  --rim:     rgba(255,255,255,.08);
  --rim2:    rgba(255,255,255,.13);
  --tx:      #f0eaff;
  --mu:      #9387b8;
  --mu2:     #6b5e9a;

  /* Jewel Accents */
  --rose:    #f472b6;
  --violet:  #a78bfa;
  --amber:   #fbbf24;
  --emerald: #34d399;
  --sapphire:#60a5fa;
  --coral:   #fb7185;
  --teal:    #2dd4bf;
  --ac:      #a78bfa;
  --ac2:     #7c3aed;
  --br:      rgba(255,255,255,.1);
  --sf:      rgba(255,255,255,.05);
  --bg:      rgba(255,255,255,.04);

  /* Semantic */
  --dn:#fb7185;--wn:#fbbf24;--ok:#34d399;--bl:#60a5fa;--gn:#34d399;

  --rd:18px;
  --sh: 0 8px 32px rgba(0,0,0,.4);
  --glow-v: 0 0 24px rgba(167,139,250,.25);
  --glow-r: 0 0 24px rgba(244,114,182,.25);
  --glow-e: 0 0 24px rgba(52,211,153,.25);
}

/* ── BASE ── */
html{scroll-behavior:smooth}
body{
  font-family:'Cairo',sans-serif;
  background:var(--night);
  color:var(--tx);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
  overscroll-behavior:none;
}

/* Animated mesh background */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(167,139,250,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 80%, rgba(244,114,182,.09) 0%, transparent 55%),
    radial-gradient(ellipse 50% 70% at 50% 50%, rgba(96,165,250,.06) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--deep)}
::-webkit-scrollbar-thumb{background:var(--mu2);border-radius:999px}
::-webkit-scrollbar-thumb:hover{background:var(--violet)}

/* ── KEYFRAMES ── */
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes mi{from{opacity:0;transform:scale(.92) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 0 0 rgba(167,139,250,.4)}50%{box-shadow:0 0 0 8px rgba(167,139,250,0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── GLASS MIXIN HELPERS ── */
.glass{
  background:var(--glass);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  
  border:1px solid var(--rim);
}

/* ════════════════ LOGIN ════════════════ */
#loginScreen{
  position:relative;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;z-index:1;
}

/* Decorative orbs */
#loginScreen::before,#loginScreen::after{
  content:'';position:absolute;border-radius:50%;pointer-events:none;
  animation:float 6s ease-in-out infinite;
}
#loginScreen::before{
  width:400px;height:400px;top:-100px;right:-80px;
  background:radial-gradient(circle,rgba(167,139,250,.18),transparent 70%);
  animation-delay:0s;
}
#loginScreen::after{
  width:300px;height:300px;bottom:-60px;left:-60px;
  background:radial-gradient(circle,rgba(244,114,182,.14),transparent 70%);
  animation-delay:-3s;
}

.lb{text-align:center;margin-bottom:40px;animation:fu .6s ease both}
.lb-icon{
  font-size:64px;margin-bottom:14px;display:inline-block;
  filter:drop-shadow(0 0 24px rgba(167,139,250,.6));
  animation:float 4s ease-in-out infinite;
}
.lb-title{
  font-size:36px;font-weight:900;letter-spacing:-1.5px;
  background:linear-gradient(135deg,#fff 0%,#c4b5fd 50%,#f9a8d4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.lb-sub{font-size:14px;color:var(--mu);margin-top:8px}

.ls{width:100%;max-width:660px;margin-bottom:26px;animation:fu .6s ease both;animation-delay:.1s}
.ls-lbl{
  font-size:11px;font-weight:700;color:var(--mu2);
  margin-bottom:12px;letter-spacing:2px;
  display:flex;align-items:center;gap:8px;
}
.ls-lbl::before{content:'';flex:1;height:1px;background:var(--rim2)}
.ls-lbl::after{content:'';flex:1;height:1px;background:var(--rim2)}

.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px}

.lc{
  background:rgba(255,255,255,.04);
  border-radius:20px;border:1px solid var(--rim);
  padding:18px 12px;text-align:center;cursor:pointer;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.lc::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(244,114,182,.1));
  transition:opacity .25s;
}
.lc:hover{transform:translateY(-5px) scale(1.03);border-color:var(--rim2);box-shadow:0 20px 50px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.08)}
.lc:hover::before{opacity:1}
.lc.ac.sel{border-color:rgba(167,139,250,.6);box-shadow:0 0 0 3px rgba(167,139,250,.2),0 16px 40px rgba(0,0,0,.3)}
.lc.ec.sel{border-color:rgba(52,211,153,.6);box-shadow:0 0 0 3px rgba(52,211,153,.15),0 16px 40px rgba(0,0,0,.3)}

.lc-av{
  width:52px;height:52px;border-radius:50%;
  margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  position:relative;z-index:1;
}
.lc-name{font-size:14px;font-weight:800;color:#fff;position:relative;z-index:1}
.lc-role{font-size:11px;color:var(--mu);margin-top:3px;position:relative;z-index:1}
.lc-lock{font-size:13px;color:var(--mu2);margin-top:8px;position:relative;z-index:1}

.ent-btn{
  display:block;width:100%;max-width:660px;padding:16px;
  border:none;border-radius:16px;
  font-family:'Cairo',sans-serif;font-size:16px;font-weight:800;color:#fff;
  cursor:pointer;transition:all .25s;opacity:.25;pointer-events:none;
  background:linear-gradient(135deg,#7c3aed,#a855f7,#ec4899);
  background-size:200% 200%;
  box-shadow:0 6px 30px rgba(124,58,237,.3);
  animation:fu .6s ease both;animation-delay:.2s;
}
.ent-btn.ready{opacity:1;pointer-events:all}
.ent-btn.ready:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(124,58,237,.5);
  filter:brightness(1.1);
}
.ent-btn.eb{background:linear-gradient(135deg,#059669,#10b981,#34d399);box-shadow:0 6px 30px rgba(5,150,105,.3)}
.ent-btn.eb.ready:hover{box-shadow:0 12px 40px rgba(5,150,105,.5)}


/* ════════════════ PIN ════════════════ */
#pinOv{
  position:fixed;inset:0;
  background:rgba(5,2,16,.8);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;z-index:500;padding:20px;
}
#pinOv.open{display:flex}

.pin-box{
  background:linear-gradient(145deg,var(--card),#1d1440);
  border:1px solid var(--rim2);
  border-radius:28px;padding:36px 30px;width:100%;max-width:340px;
  text-align:center;animation:mi .25s ease;
  box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.05);
}
.pin-av{
  width:68px;height:68px;border-radius:50%;margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:900;color:#fff;
  box-shadow:0 0 0 3px rgba(255,255,255,.1),0 8px 24px rgba(0,0,0,.4);
}
.pin-nm{font-size:22px;font-weight:900;margin-bottom:4px}
.pin-lbl{font-size:13px;color:var(--mu);margin-bottom:22px}
.pin-dots{display:flex;justify-content:center;gap:16px;margin-bottom:20px}
.pd{
  width:18px;height:18px;border-radius:50%;
  border:2px solid var(--mu2);background:transparent;transition:all .2s;
}
.pd.on{
  background:var(--violet);border-color:var(--violet);
  transform:scale(1.2);box-shadow:0 0 12px rgba(167,139,250,.6);
}
.pin-err{font-size:13px;color:var(--coral);font-weight:700;margin-bottom:12px;min-height:20px}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.ppb{
  padding:17px;border-radius:16px;border:1px solid var(--rim2);
  background:rgba(255,255,255,.06);
  font-family:'Cairo',sans-serif;font-size:20px;font-weight:800;color:var(--tx);
  cursor:pointer;transition:all .15s;
}
.ppb:hover{background:var(--violet);color:#fff;border-color:var(--violet);transform:scale(.96);box-shadow:0 0 16px rgba(167,139,250,.4)}
.ppb:active{transform:scale(.92)}
.ppb,.tck,.mvb,.ib,.add-btn,.btn-p,.btn-s,.rt,.fchip,.lc,.ec,.tab-btn{overflow:visible;touch-action:manipulation}
.ppb.del{background:rgba(251,113,133,.08);color:var(--coral)}
.ppb.del:hover{background:var(--coral);color:#fff;border-color:var(--coral);box-shadow:0 0 16px rgba(251,113,133,.4)}
.pin-forgot{font-size:12px;color:var(--mu2);cursor:pointer;text-decoration:underline;text-underline-offset:3px;display:inline-block;transition:color .15s}
.pin-forgot:hover{color:var(--violet)}

/* ════════════════ APP ════════════════ */
#app{display:none;min-height:100vh;flex-direction:column;position:relative;z-index:1}

/* ── TOPBAR ── */
.topbar{
  background:rgba(17,9,32,.9);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--rim2);
  color:var(--tx);display:flex;align-items:center;justify-content:space-between;
  padding:14px 26px;flex-wrap:wrap;gap:10px;
  position:sticky;top:0;z-index:100;overflow:hidden;
}
.tb-l{display:flex;align-items:center;gap:13px}
.tb-av{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:900;color:#fff;cursor:pointer;flex-shrink:0;
  border:2px solid var(--rim2);transition:all .2s;
}
.tb-av:hover{border-color:var(--violet);box-shadow:var(--glow-v);transform:scale(1.08)}
.tb-nm{font-size:15px;font-weight:800;color:var(--tx)}
.tb-bg{font-size:11px;font-weight:700;padding:3px 11px;border-radius:999px;margin-top:4px;display:inline-block}
.bga{background:rgba(167,139,250,.15);color:var(--violet);border:1px solid rgba(167,139,250,.3)}
.bge{background:rgba(52,211,153,.12);color:var(--emerald);border:1px solid rgba(52,211,153,.3)}
.tb-r{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.tbs{text-align:center}
.tbs-n{font-size:20px;font-weight:900;line-height:1}
.tbs-l{font-size:10px;color:var(--mu);margin-top:2px}
.tbs-n.red{color:var(--coral)}.tbs-n.grn{color:var(--emerald)}
.ibtn2{
  padding:8px 14px;border-radius:10px;
  border:1px solid var(--rim2);background:rgba(255,255,255,.05);
  color:var(--mu);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .18s;
}
.ibtn2:hover{background:rgba(255,255,255,.12);color:var(--tx);border-color:var(--rim2)}

/* ── TABS ── */
.tab-nav{
  background:rgba(17,9,32,.7);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--rim);
  display:flex;padding:0 20px;overflow-x:auto;gap:2px;
}
.tab-nav::-webkit-scrollbar{height:0}
.tab-btn{
  padding:14px 18px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  color:var(--mu);border:none;background:transparent;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.tab-btn:hover{color:var(--tx)}
.tab-btn.active{color:var(--violet);border-bottom-color:var(--violet);text-shadow:0 0 20px rgba(167,139,250,.5)}
.t-badge{
  background:var(--coral);color:#fff;font-size:10px;font-weight:800;
  padding:1px 7px;border-radius:999px;
  box-shadow:0 0 8px rgba(251,113,133,.5);
}
.content{max-width:1180px;margin:0 auto;padding:28px 24px;width:100%;animation:fu .2s ease both}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:700px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.scd{
  border-radius:20px;padding:20px;position:relative;overflow:hidden;
  border:1px solid var(--rim2);cursor:default;
  transition:transform .2s,box-shadow .2s;
}
.scd:hover{transform:translateY(-4px) scale(1.02);cursor:default}
.scd:nth-child(1){background:linear-gradient(135deg,#3b1f8c 0%,#6d28d9 100%);box-shadow:0 8px 32px rgba(109,40,217,.35)}
.scd:nth-child(2){background:linear-gradient(135deg,#065f46 0%,#059669 100%);box-shadow:0 8px 32px rgba(5,150,105,.3)}
.scd:nth-child(3){background:linear-gradient(135deg,#92400e 0%,#d97706 100%);box-shadow:0 8px 32px rgba(217,119,6,.3)}
.scd:nth-child(4){background:linear-gradient(135deg,#9f1239 0%,#e11d48 100%);box-shadow:0 8px 32px rgba(225,29,72,.3)}
.scd::before{
  content:'';position:absolute;top:-30px;left:-30px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,.07);
}
.scd::after{
  content:'';position:absolute;bottom:-20px;right:-20px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.scd-i{font-size:24px;margin-bottom:8px;position:relative;display:block}
.scd-n{font-size:32px;font-weight:900;color:#fff;margin-bottom:3px;position:relative;line-height:1}
.scd-l{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);position:relative}
.scd-n.cr,.scd-n.cg,.scd-n.cw{color:#fff}

/* ── GENERAL ── */
.sec-h{
  font-size:16px;font-weight:800;margin-bottom:16px;
  display:flex;align-items:center;gap:9px;color:var(--tx);
}
.sec-h::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--rim2),transparent);margin-right:4px}
.card{
  background:rgba(255,255,255,.04);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-radius:var(--rd);border:1px solid var(--rim2);
  padding:22px;
  box-shadow:0 4px 24px rgba(0,0,0,.3);
}

/* ── EXEC GRID ── */
.exec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:26px}
.ec{
  background:rgba(255,255,255,.04);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  border-radius:var(--rd);border:1px solid var(--rim2);
  padding:16px;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.ec::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  opacity:0;transition:opacity .2s;
}
.ec:nth-child(1)::after{background:linear-gradient(90deg,var(--violet),var(--rose))}
.ec:nth-child(2)::after{background:linear-gradient(90deg,var(--teal),var(--sapphire))}
.ec:nth-child(3)::after{background:linear-gradient(90deg,var(--amber),var(--coral))}
.ec:nth-child(4)::after{background:linear-gradient(90deg,var(--sapphire),var(--violet))}
.ec:nth-child(5)::after{background:linear-gradient(90deg,var(--rose),var(--coral))}
.ec:hover{transform:translateY(-4px) scale(1.01);border-color:var(--rim2);box-shadow:0 12px 36px rgba(0,0,0,.35)}
.ec:hover::after{opacity:1}
.ec-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ec-av{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:900;color:#fff;flex-shrink:0;
  box-shadow:0 4px 14px rgba(0,0,0,.35);
}
.ec-nm{font-size:13px;font-weight:800}.ec-ct{font-size:11px;color:var(--mu)}
.prog{height:5px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
.prog-f{height:100%;border-radius:999px;transition:width .6s ease}
.ec-sts{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-top:7px}
.ov-b{
  font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;
  background:rgba(251,113,133,.15);color:var(--coral);
  border:1px solid rgba(251,113,133,.3);margin-top:7px;display:inline-block;
}

/* ── FORM ── */
.fl{font-size:11px;font-weight:700;color:var(--mu);margin-bottom:6px;display:block;letter-spacing:.8px;text-transform:uppercase}
.fi{
  width:100%;padding:11px 15px;border-radius:13px;
  border:1px solid var(--rim2);background:rgba(255,255,255,.05);
  font-family:'Cairo',sans-serif;font-size:14px;color:var(--tx);
  outline:none;transition:all .2s;margin-bottom:14px;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
.fi:focus{
  border-color:rgba(167,139,250,.5);background:rgba(255,255,255,.08);
  box-shadow:0 0 0 3px rgba(167,139,250,.12),inset 0 0 0 1px rgba(167,139,250,.2);
}
.fi option{background:var(--card);color:var(--tx)}
.fi.ta{min-height:80px;resize:vertical}

.pr-row{display:flex;gap:8px;margin-bottom:14px}
.pb{
  flex:1;padding:10px 4px;border-radius:12px;
  border:1px solid var(--rim2);background:rgba(255,255,255,.04);
  font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;color:var(--mu);
}
.pb:hover{border-color:var(--violet);color:var(--violet)}
.pb.sel-h{background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.5);color:var(--coral);border-width:1.5px}
.pb.sel-m{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.5);color:var(--amber);border-width:1.5px}
.pb.sel-l{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.5);color:var(--emerald);border-width:1.5px}

.add-btn{
  width:100%;padding:13px;border-radius:14px;border:none;
  font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;color:#fff;
  cursor:pointer;
  background:linear-gradient(135deg,#7c3aed 0%,#a855f7 50%,#ec4899 100%);
  background-size:200% 200%;
  box-shadow:0 6px 24px rgba(124,58,237,.4);
  transition:all .25s;position:relative;overflow:hidden;
}
.add-btn::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
  transition:opacity .2s;
}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(124,58,237,.55)}
.add-btn:hover::before{opacity:1}
.two-col{display:grid;grid-template-columns:370px 1fr;gap:24px;align-items:start}
@media(max-width:860px){.two-col{grid-template-columns:1fr}}

/* ── TASK ITEMS (assigner) ── */
.tasks-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sw{flex:1;min-width:150px;position:relative}
.srch{
  width:100%;padding:11px 15px 11px 14px;padding-right:42px;border-radius:13px;
  border:1px solid var(--rim2);background:rgba(255,255,255,.05);
  font-family:'Cairo',sans-serif;font-size:13px;color:var(--tx);
  outline:none;transition:all .2s;
}
.srch:focus{border-color:rgba(167,139,250,.5);box-shadow:0 0 0 3px rgba(167,139,250,.1)}

/* Topbar animated gradient bottom line */
.topbar::after{
  content:'';position:absolute;bottom:0;right:0;left:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--violet) 30%,var(--rose) 70%,transparent 100%);

}

/* PIN dots bounce on fill */
@keyframes dot-pop{0%{transform:scale(1)}40%{transform:scale(1.5)}70%{transform:scale(.85)}100%{transform:scale(1)}}

/* Task priority left border — color by priority class */
.tc.ov::before{background:linear-gradient(180deg,var(--coral),#ff4d6d)!important;opacity:1!important}
.tc.td2::before{background:linear-gradient(180deg,var(--amber),#f59e0b)!important;opacity:1!important}

/* Priority shimmer on high-priority overdue tasks */
@keyframes urgent-pulse{0%,100%{box-shadow:0 0 0 0 rgba(251,113,133,0)}50%{box-shadow:0 0 0 4px rgba(251,113,133,.15)}}
.tc.ov{animation:fu .25s ease both,urgent-pulse 2.5s ease-in-out infinite}

/* Completion sparkle keyframe */
@keyframes sparkle{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(1.8) rotate(180deg);opacity:0}}
.tck.chk::after{
  content:'✦';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:8px;color:currentColor;
  animation:sparkle .5s ease forwards;
  pointer-events:none;
}

/* Tab transition */

/* Progress bars animate in */
@keyframes bar-grow{from{transform:scaleX(0);transform-origin:right}to{transform:scaleX(1);transform-origin:right}}
.prog-f{transform-origin:right;animation:bar-grow .9s cubic-bezier(.34,1.2,.64,1) both .3s}

/* Better badge pulse on overdue count */
.t-badge{animation:urgent-pulse 2s ease-in-out infinite}

/* Exec card hover glow matching color */
.ec:nth-child(1):hover{box-shadow:0 12px 36px rgba(167,139,250,.2)}
.ec:nth-child(2):hover{box-shadow:0 12px 36px rgba(45,212,191,.2)}

.lc.ac.sel .lc-av{box-shadow:0 0 0 3px rgba(167,139,250,.5),0 4px 20px rgba(0,0,0,.4)}

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.sec-h{text-shadow:0 0 20px rgba(167,139,250,.2)}

.fchip{isolation:isolate}.fchip::after{content:'';position:absolute;inset:0;background:rgba(167,139,250,.1);transform:scale(0);border-radius:999px;transition:transform .2s;z-index:-1}

.today-sec{

  position:relative;
}
.today-sec::after{
  content:'';position:absolute;inset:-1px;border-radius:var(--rd);
  background:linear-gradient(135deg,rgba(167,139,250,.4),rgba(244,114,182,.3),rgba(96,165,250,.3));

  -webkit-mask-composite:xor;mask-composite:exclude;
  padding:1px;pointer-events:none;
}

.ex-hdr{position:relative}
.ex-hdr::after{
  content:'';position:absolute;inset:-1px;border-radius:var(--rd);
  background:linear-gradient(135deg,rgba(167,139,250,.4),rgba(244,114,182,.25));

  -webkit-mask-composite:xor;mask-composite:exclude;
  padding:1px;pointer-events:none;
}

/* Better empty state */
.empty{position:relative}
.empty::before{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(167,139,250,.08),transparent 70%);
  pointer-events:none;
}

/* Confetti particle */
@keyframes confetti-fall{
  0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1}
  100%{transform:translateY(60px) rotate(720deg) scale(0);opacity:0}
}
.confetti-p{
  position:fixed;width:8px;height:8px;border-radius:2px;
  pointer-events:none;z-index:99998;
  animation:confetti-fall .8s ease forwards;
}


/* Better progress bar in reports — striped */
.rb-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(255,255,255,.1) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.1) 75%,transparent 75%);

  border-radius:inherit;

}

/* Today count badge pulse */

function fmtD(d){if(!d)return'';try{return new Date(d).toLocaleDateString('ar-SA',{year:'numeric',month:'short',day:'numeric'})}catch{return d}}
function fmtT(t){if(!t)return'';try{return new Date(t).toLocaleString('ar-SA',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'})}catch{return t}}
function toS(off=0){const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().split('T')[0]}
function dueS(date,done){
  if(!date||done)return'none';
  const d=Math.ceil((new Date(date)-new Date().setHours(0,0,0,0))/864e5);
  if(d<0)return'overdue';if(d===0)return'today';if(d<=2)return'soon';return'ok';
}
function dueB(date,done){
  const s=dueS(date,done);
  if(s==='none')return'';
  if(s==='overdue')return'<span class="tag-ov">⚠️ متأخرة</span>';
  if(s==='today')return'<span class="tag-td">📅 اليوم</span>';
  if(s==='soon'){const d=Math.ceil((new Date(date)-new Date().setHours(0,0,0,0))/864e5);return`<span class="tag-sn">🕐 ${d} أيام</span>`;}
  return`<span class="tag-ok">📅 ${fmtD(date)}</span>`;
}
function tCls(t){const s=dueS(t.date,t.done);return'tc'+(t.done?' dn':s==='overdue'?' ov':s==='today'?' td2':'');}
function eCls(t){const s=dueS(t.date,t.done);return'et'+(t.done?' dn':s==='overdue'?' ov':s==='today'?' td2':'');}
function avH(id,sz=16){const m=gm(id);if(!m)return'';return`<div class="tw-av" style="background:${m.color};width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.42)}px">${m.ini}</div>`}
function nextD(date,r){const d=new Date(date||toS());if(r==='daily')d.setDate(d.getDate()+1);else if(r==='weekly')d.setDate(d.getDate()+7);else d.setMonth(d.getMonth()+1);return d.toISOString().split('T')[0]}
function toast(msg){const old=document.querySelector('.toast');if(old)old.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

/* ════════════════ STORAGE ════════════════ */

}

    {id:10,name:'مراجعة دروس الرياضيات',notes:'الوحدة الثالثة',to:'ghada',from:'abdulrahman',priority:'med',date:toS(1),done:false,rec:null,ca:toS()+'T08:00:00',cpa:null,comments:[],ord:2},
  ],arc:[],log:[

    {id:3,action:'commented',tn:'شراء الخضروات من السوق',by:'duaa',time:toS(-1)+'T14:00:00',det:'',icon:'💬'},
  ],reqs:[],tpls:[
    {id:1,name:'تنظيف أسبوعي',notes:'تنظيف شامل للمنزل',priority:'med',rec:'weekly',label:'🧹 تنظيف'},
    {id:2,name:'تحضير الغداء',notes:'',priority:'high',rec:'daily',label:'🍲 طبخ'},
  ],pins:{...DEF_PINS},nid:11,ncid:3,nlid:4,nrid:1,ntid:3};}

/* ════════════════ RECURRING ════════════════ */
function chkRec(){
  const today=toS();
  D.tasks.filter(t=>t.done&&t.rec&&t.date&&t.date<today).forEach(t=>{
    // Loop to catch up ALL missed cycles (e.g. app not opened for weeks)
    let nd=nextD(t.date,t.rec);
    let safety=0;
    while(nd<=today&&safety<52){
      safety++;
      // Only create the LAST missed task (most recent)
      const nd2=nextD(nd,t.rec);
      if(nd2>today){
        // This is the one to create
        const nt={...t,id:++D.nid,done:false,cpa:null,ca:new Date().toISOString(),date:nd,comments:[],ord:1};
        D.tasks.push(nt);
        addLog('rec',nt.name,t.from,`تكرار — ${recL(t.rec)}`,'🔁');
      }
      nd=nd2;
    }
    t.rec=null;
  });save();
}

/* ════════════════ LOG ════════════════ */
function addLog(act,tn,by,det='',icon='📌'){
  D.log.unshift({id:++D.nlid,action:act,tn,by,time:new Date().toISOString(),det,icon});
  if(D.log.length>200)D.log.splice(100);save();
}

/* ════════════════ PIN ════════════════ */
function showPin(){

function epn(d){if(pinBuf.length>=4)return;pinBuf.push(d);updDots();if(pinBuf.length===4)chkPin();}
function dpn(){pinBuf.pop();updDots();}
function updDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('on',i<pinBuf.length);}
function chkPin(){

    document.getElementById('pinOv').classList.remove('open');

}

  `,[{label:'إغلاق',cls:'btn-s',fn:'closeModal()'}]);
}

/* ════════════════ CHANGE PIN ════════════════ */
function openChgPin(){cpStep=0;cpNew='';cpBuf=[];openModal('تغيير رمز المرور',cpUI(),[{label:'إغلاق',cls:'btn-s',fn:'closeModal()'}]);}
function cpUI(){
  const steps=['أدخل رمزك الحالي','أدخل الرمز الجديد (4 أرقام)','أكّد الرمز الجديد'];
  const filled=cpBuf.length;
  return`<p style="font-size:14px;color:var(--mu);margin-bottom:16px;font-weight:700">${steps[cpStep]}</p>
  <div class="pin-dots" style="justify-content:center;gap:12px;margin-bottom:16px">
    ${[0,1,2,3].map(i=>`<div class="pd ${i<filled?'on':''}" id="cpd${i}"></div>`).join('')}
  </div>
  <div class="pin-err" id="cpErr"></div>
  <div class="pin-pad">
    ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="ppb" onclick="cpInput('${n}')">${n}</button>`).join('')}
    <button class="ppb del" onclick="cpDel()">⌫</button>
    <button class="ppb" onclick="cpInput('0')">0</button>
    <button class="ppb" style="font-size:12px" onclick="closeModal()">إلغاء</button>
  </div>`;}
function cpInput(d){
  if(cpBuf.length>=4)return;cpBuf.push(d);
  for(let i=0;i<4;i++){const el=document.getElementById('cpd'+i);if(el)el.classList.toggle('on',i<cpBuf.length);}
  if(cpBuf.length===4){setTimeout(()=>{
    const v=cpBuf.join('');cpBuf=[];
    if(cpStep===0){if(v!==D.pins[cu]){const el=document.getElementById('cpErr');if(el)el.textContent='رمز خاطئ';return;}cpStep=1;}
    else if(cpStep===1){cpNew=v;cpStep=2;}
    else{
      if(v!==cpNew){const el=document.getElementById('cpErr');if(el)el.textContent='الرمزان لا يتطابقان';cpStep=1;cpNew='';document.getElementById('mBody').innerHTML=cpUI();return;}
      D.pins[cu]=cpNew;save();addLog('chgpin',gm(cu).name,cu,'','🔑');toast('✅ تم تغيير رمز المرور');closeModal();return;
    }
    document.getElementById('mBody').innerHTML=cpUI();
  },120);}
}
function cpDel(){cpBuf.pop();for(let i=0;i<4;i++){const el=document.getElementById('cpd'+i);if(el)el.classList.toggle('on',i<cpBuf.length);}}

function dashH(){
  const done=D.tasks.filter(t=>t.done).length,tot=D.tasks.length,pnd=tot-done;
  const ov=D.tasks.filter(t=>!t.done&&dueS(t.date,false)==='overdue');
  const todayTasks=D.tasks.filter(t=>!t.done&&(dueS(t.date,false)==='today'||dueS(t.date,false)==='overdue'));
  let h=`<div class="stat-row">
    <div class="scd"><div class="scd-i">📋</div><div class="scd-n">${tot}</div><div class="scd-l">إجمالي المهام</div></div>
    <div class="scd"><div class="scd-i">✅</div><div class="scd-n cg">${done}</div><div class="scd-l">مكتملة</div></div>
    <div class="scd"><div class="scd-i">⏳</div><div class="scd-n cw">${pnd}</div><div class="scd-l">معلقة</div></div>
    <div class="scd"><div class="scd-i">⚠️</div><div class="scd-n cr">${ov.length}</div><div class="scd-l">متأخرة</div></div>
  </div>`;
  if(ov.length)h+=`<div class="alert-b alert-red"><span style="font-size:18px">⚠️</span><div class="alert-t">${ov.length} مهمة متأخرة: ${ov.map(t=>t.name).join(' · ')}</div></div>`;
  if(todayTasks.length){
    h+=`<div class="today-sec">
      <div class="today-h">☀️ مهام اليوم <span class="today-count">${todayTasks.length}</span></div>`;
    todayTasks.slice(0,5).forEach(t=>{const tm=gm(t.to);h+=`<div class="today-item">
      ${avH(t.to,20)}
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${t.name}</div><div style="font-size:11px;color:var(--mu)">${tm?tm.name:''} · ${priL(t.priority)}</div></div>
      ${dueB(t.date,false)}
    </div>`;});
    if(todayTasks.length>5)h+=`<div style="text-align:center;margin-top:9px"><a href="#" onclick="switchTab('today')" style="font-size:12px;color:var(--ac);font-weight:700">عرض الكل (${todayTasks.length})</a></div>`;
    h+=`</div>`;
  }
  h+=`<div class="sec-h">⚡ عبء العمل</div><div class="exec-grid">`;
  EX.forEach(m=>{
    const mt=D.tasks.filter(t=>t.to===m.id),dn=mt.filter(t=>t.done).length,ov2=mt.filter(t=>!t.done&&dueS(t.date,false)==='overdue').length;

      <div class="ec-top"><div class="ec-av" style="background:${m.color}">${m.ini}</div><div><div class="ec-nm">${m.name}</div><div class="ec-ct">${mt.length} مهمة</div></div></div>

      ${ov2?`<div class="ov-b">⚠️ ${ov2} متأخرة</div>`:''}
    </div>`;
  });
  h+=`</div>`;
  const pr=D.reqs.filter(r=>r.status==='pending').length;
  if(pr)h+=`<div class="alert-b alert-yw"><span style="font-size:18px">📩</span><div class="alert-t">${pr} طلب ينتظر موافقتك — <a href="#" onclick="switchTab('requests')">عرض الطلبات</a></div></div>`;
  h+=`<div class="sec-h">🕐 آخر المكتملة</div><div class="card">`;
  const rec=D.tasks.filter(t=>t.done&&t.cpa).sort((a,b)=>new Date(b.cpa)-new Date(a.cpa)).slice(0,5);
  if(!rec.length)h+=`<div style="text-align:center;padding:16px;color:var(--mu)">لا توجد مهام مكتملة بعد</div>`;
  rec.forEach(t=>{const fm=gm(t.from),tm=gm(t.to);h+=`<div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--rim)">
    <span style="font-size:18px">✅</span>
    <div style="flex:1"><div style="font-size:13px;font-weight:700">${t.name}</div>
    <div style="font-size:11px;color:var(--mu)">${fm?fm.name:''} ← ${tm?tm.name:''} · ${fmtD(t.cpa)}</div></div>
  </div>`;});
  h+=`</div>`;return h;
}

/* ════════════════ TODAY TAB ════════════════ */
function todayH(){
  const tasks=D.tasks.filter(t=>!t.done&&(dueS(t.date,false)==='today'||dueS(t.date,false)==='overdue'));
  tasks.sort((a,b)=>{
    const so={overdue:0,today:1};const as=dueS(a.date,false),bs=dueS(b.date,false);
    if((so[as]??2)!==(so[bs]??2))return(so[as]??2)-(so[bs]??2);
    return {high:0,med:1,low:2}[a.priority]-{high:0,med:1,low:2}[b.priority];
  });
  if(!tasks.length)return`<div class="empty"><div class="empty-i">🎉</div><div class="empty-t">ماشاء الله! لا مهام لليوم</div><div class="empty-s">كل المهام منجزة أو مجدولة لأيام قادمة</div></div>`;
  let h=`<div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
    <div class="sec-h" style="margin:0">☀️ مهام اليوم والمتأخرة <span style="font-size:13px;color:var(--mu);font-weight:400">(${tasks.length})</span></div>
    <button onclick="bulkDoneAll()" class="btn-done-all">✅ إكمال الكل</button>
  </div><div class="tlist">`;
  tasks.forEach(t=>{
    const tm=gm(t.to),fm=gm(t.from);
    h+=`<div class="${tCls(t)}">
      <button class="tck" style="color:${tm?tm.color:'#ccc'}" onclick="tog(${t.id})">${t.done?'✓':''}</button>
      <div class="tbody">
        <div class="tn">${t.name}</div>
        ${t.notes?`<div class="tnts">${t.notes}</div>`:''}
        <div class="tmeta">
          ${tm?`<div class="tw">${avH(t.to,16)}<span>${tm.name}</span></div>`:''}
          ${fm?`<div class="tw">${avH(t.from,14)}<span style="font-size:10px;color:var(--mu)">${fm.name}</span></div>`:''}
          <span class="pp pp-${t.priority==='high'?'h':t.priority==='med'?'m':'l'}">${priL(t.priority)}</span>
          ${dueB(t.date,t.done)}
        </div>
      </div>
      <div class="tacts">
        <button class="ib e" onclick="openEdit(${t.id})">✏️</button>
        <button class="ib d" onclick="delT(${t.id})">🗑️</button>
      </div>
    </div>`;
  });
  return h+'</div>';
}
function bulkDoneAll(){
  const tasks=D.tasks.filter(t=>!t.done&&(dueS(t.date,false)==='today'||dueS(t.date,false)==='overdue'));
  if(!tasks.length)return;
  if(!confirm(`تعليم ${tasks.length} مهمة كمكتملة؟`))return;
  tasks.forEach(t=>{t.done=true;t.cpa=new Date().toISOString();});
  addLog('completed',`${tasks.length} مهام دفعة`,cu,'','✅');save();renderApp();toast(`✅ تم إكمال ${tasks.length} مهمة`);
}

/* ════════════════ TASKS LIST ════════════════ */
function tasksH(){
  const byA=AS.map(a=>({...a})),byE=EX.map(e=>({...e}));
  let h='';
  if(bulkMode&&bulkSel.size>0){
    h+=`<div class="bulk-bar">
      <span class="bulk-info">✅ تم تحديد ${bulkSel.size} مهمة</span>

      <button class="bkb dl" onclick="bulkDel()">🗑️ حذف المحددة</button>
      <button class="bkb cl" onclick="bulkMode=false;bulkSel.clear();renderApp()">✕ إلغاء</button>
    </div>`;
  }

    <div class="sw"><input class="srch" placeholder="ابحث..." value="${sq}" oninput="sq=this.value;renderApp()"><span class="si">🔍</span></div>
    <button class="ib${bulkMode?' e':''}" onclick="bulkMode=!bulkMode;bulkSel.clear();renderApp()" title="تحديد متعدد" style="width:auto;padding:0 10px;font-size:12px;font-weight:700;gap:4px">${bulkMode?'✕ إلغاء':'☑️ تحديد'}</button>
  </div>

    ${[{id:'all',name:'الكل',color:'#888',ini:'ك'},...byA].map(a=>`<button class="fchip${fromF===a.id?' sel':''}" onclick="fromF='${a.id}';renderApp()" style="gap:4px">

  </div>
  <div class="frow">
    <span style="font-size:11px;font-weight:700;color:var(--mu);align-self:center">لـ:</span>
    ${[{id:'all',name:'الكل',color:'#888',ini:'ك'},...byE].map(e=>`<button class="fchip${toF===e.id?' sel':''}" onclick="toF='${e.id}';renderApp()" style="gap:4px">
      ${e.id!=='all'?`<div style="width:13px;height:13px;border-radius:50%;background:${e.color};display:inline-flex;align-items:center;justify-content:center;font-size:5px;color:#fff;font-weight:800">${e.ini}</div>`:''}${e.name}
    </button>`).join('')}
  </div>`;
  let tasks=[...D.tasks];
  if(tf==='pending')tasks=tasks.filter(t=>!t.done);
  else if(tf==='done')tasks=tasks.filter(t=>t.done);
  else if(tf==='overdue')tasks=tasks.filter(t=>!t.done&&dueS(t.date,false)==='overdue');
  if(fromF!=='all')tasks=tasks.filter(t=>t.from===fromF);
  if(toF!=='all')tasks=tasks.filter(t=>t.to===toF);
  if(sq)tasks=tasks.filter(t=>t.name.includes(sq)||(t.notes||'').includes(sq));
  tasks.sort((a,b)=>{

          ${fm?`<div class="tw">${avH(t.from,14)}<span style="font-size:10px;color:var(--mu)">${fm.name}</span></div>`:''}
          <span class="pp pp-${t.priority==='high'?'h':t.priority==='med'?'m':'l'}">${priL(t.priority)}</span>

        </div>
      </div>
      <div class="tacts">

    </div>`;
  });
  return h+'</div>';
}

/* BULK ACTIONS */
function toggleBulk(id){if(bulkSel.has(id))bulkSel.delete(id);else bulkSel.add(id);renderApp();}
function bulkDone(){
  if(!bulkSel.size)return;
  if(!confirm(`إكمال ${bulkSel.size} مهمة؟`))return;
  bulkSel.forEach(id=>{const t=D.tasks.find(x=>x.id===id);if(t){t.done=true;t.cpa=new Date().toISOString();}});
  addLog('completed',`${bulkSel.size} مهام دفعة`,cu,'','✅');
  bulkMode=false;bulkSel.clear();save();renderApp();toast(`✅ تم إكمال المهام المحددة`);
}
function bulkDel(){
  if(!bulkSel.size)return;
  if(!confirm(`حذف ${bulkSel.size} مهمة؟`))return;
  bulkSel.forEach(id=>{const idx=D.tasks.findIndex(x=>x.id===id);if(idx>=0){const t={...D.tasks[idx],archivedAt:new Date().toISOString()};D.arc.push(t);D.tasks.splice(idx,1);}});
  addLog('archived',`${bulkSel.size} مهام دفعة`,cu,'','📦');
  bulkMode=false;bulkSel.clear();save();renderApp();toast(`📦 تم نقل المهام للأرشيف`);
}

/* ════════════════ REQUESTS ════════════════ */
function reqsH(){
  const pnd=D.reqs.filter(r=>r.status==='pending');
  const old=D.reqs.filter(r=>r.status!=='pending');
  let h=`<div class="sec-h">📩 طلبات معلقة <span style="font-size:13px;color:var(--mu);font-weight:400">(${pnd.length})</span></div>`;
  if(!pnd.length)h+=`<div class="empty"><div class="empty-i">📭</div><div class="empty-t">لا توجد طلبات معلقة</div></div>`;
  pnd.forEach(r=>{const t=D.tasks.find(x=>x.id===r.tid),m=gm(r.by);h+=reqCard(r,t,m,true);});
  if(old.length){h+=`<div class="sec-h" style="margin-top:22px">📜 السابقة</div>`;old.slice(0,15).forEach(r=>{const t=D.tasks.find(x=>x.id===r.tid),m=gm(r.by);h+=reqCard(r,t,m,false);});}
  return h;
}
function reqCard(r,t,m,showActs){
  const stL={pending:'⏳ معلق',approved:'✅ مقبول',denied:'❌ مرفوض'};
  const stC={pending:'rs-pending',approved:'rs-approved',denied:'rs-denied'};
  const typeL={ext:'تمديد تاريخ',priority:'تغيير أولوية'};
  const info=r.type==='ext'?`من ${fmtD(r.from)} إلى ${fmtD(r.to)}`:
    r.type==='priority'?`من ${priL(r.from)} إلى ${priL(r.to)}`:'';
  const acts=showActs&&r.status==='pending'?`<div class="req-acts">
    <button class="ra-ok" onclick="handleReq(${r.id},'approved')">✅ موافقة</button>
    <button class="ra-no" onclick="handleReq(${r.id},'denied')">❌ رفض</button>
  </div>`:'';
  return`<div class="req ${r.status}">
    <div class="req-top">
      <span class="req-st ${stC[r.status]}">${stL[r.status]}</span>
      <div>
        <div class="req-type">${typeL[r.type]||r.type}</div>
        <div class="req-nm">${t?t.name:'(محذوفة)'}</div>
        <div class="req-inf">${m?m.name:''} · ${fmtT(r.time)} · ${info}</div>
      </div>
    </div>
    <div class="req-rs">${r.reason}</div>
    ${acts}
  </div>`;
}
function handleReq(rid,st){
  const r=D.reqs.find(x=>x.id===rid);if(!r)return;
  r.status=st;r.reviewedBy=cu;r.reviewedAt=new Date().toISOString();
  if(st==='approved'){
    const t=D.tasks.find(x=>x.id===r.tid);

/* MOVE */
function mvT(id,dir){
  const t=D.tasks.find(x=>x.id===id);if(!t)return;
  const group=D.tasks.filter(x=>x.to===cu&&x.priority===t.priority&&x.done===t.done);
  group.sort((a,b)=>(a.ord??999)-(b.ord??999));
  group.forEach((x,i)=>x.ord=i);
  const idx=group.findIndex(x=>x.id===id);
  const ni=idx+dir;
  if(ni<0||ni>=group.length)return;
  const tmp=group[idx].ord;group[idx].ord=group[ni].ord;group[ni].ord=tmp;
  save();renderApp();
}

function submitReq(tid,type){
  const t=D.tasks.find(x=>x.id===tid);if(!t)return;
  let toVal,rsVal;
  if(type==='ext'){
    toVal=document.getElementById('extDt').value;
    rsVal=document.getElementById('extRs').value.trim();
    if(!toVal||!rsVal){toast('❌ يرجى إدخال التاريخ والسبب');return;}
    D.reqs.push({id:++D.nrid,tid,by:cu,type:'ext',from:t.date,to:toVal,reason:rsVal,time:new Date().toISOString(),status:'pending'});
  }else{
    toVal=document.getElementById('priNew').value;
    rsVal=document.getElementById('priRs').value.trim();
    if(!rsVal){toast('❌ يرجى كتابة السبب');return;}
    D.reqs.push({id:++D.nrid,tid,by:cu,type:'priority',from:t.priority,to:toVal,reason:rsVal,time:new Date().toISOString(),status:'pending'});
  }
  addLog('req',t.name,cu,type==='ext'?'تمديد':'تغيير أولوية','📩');
  save();closeModal();renderApp();toast('📩 تم إرسال الطلب');
}

/* ── Enhanced toast with icon ── */
toast=function(msg){
  const old=document.querySelector('.toast');if(old)old.remove();
  const t=document.createElement('div');t.className='toast';
  const icon = msg.startsWith('✅')?'✅':msg.startsWith('❌')?'❌':msg.startsWith('📦')?'📦':msg.startsWith('📩')?'📩':msg.startsWith('♻️')?'♻️':'💫';
  t.innerHTML=`<span style="font-size:18px">${icon}</span><span>${msg.replace(/^[✅❌📦📩♻️💫]\s*/,'')}</span>`;
  t.style.cssText+='display:flex;align-items:center;gap:10px';
  document.body.appendChild(t);
  hap(15);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2800);
}

/* ── Confetti on task complete ── */
function confetti(x,y){
  const colors=['#a78bfa','#f472b6','#34d399','#fbbf24','#60a5fa','#fb7185'];
  for(let i=0;i<14;i++){
    const p=document.createElement('div');
    p.className='confetti-p';
    p.style.cssText=`left:${x-15+Math.random()*30}px;top:${y-10}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*.2}s;animation-duration:${.6+Math.random()*.4}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1200);
  }
}



/* ── Animated counter for stat numbers ── */
function animCount(el,target,fromVal,duration=500){
  if(!el)return;
  const start=fromVal!=null?fromVal:(parseInt(el.textContent)||0);
  if(start===target){el.textContent=target;return;}
  const range=target-start;
  const step=16;const steps=Math.max(1,duration/step);
  let i=0;
  const timer=setInterval(()=>{
    i++;
    const ease=i/steps;
    el.textContent=Math.round(start+range*(ease<1?ease*(2-ease):1));
    if(i>=steps){clearInterval(timer);el.textContent=target;}
  },step);
}

/* ── Enhanced renderTopbar with counter animation ── */
const _baseRenderTopbar=renderTopbar;
renderTopbar=function(){
  const prev={
    tot:parseInt(document.getElementById('sTot')?.textContent)||0,
    dn:parseInt(document.getElementById('sDn')?.textContent)||0,
    pn:parseInt(document.getElementById('sPn')?.textContent)||0,
    ov:parseInt(document.getElementById('sOv')?.textContent)||0,
  };
  const mine=cr==='assigner'?D.tasks:D.tasks.filter(t=>t.to===cu);
  const ov=mine.filter(t=>!t.done&&dueS(t.date,false)==='overdue').length;
  _baseRenderTopbar();
  // Animate from old values (prev) to new values
  animCount(document.getElementById('sTot'),mine.length,prev.tot);
  animCount(document.getElementById('sDn'),mine.filter(t=>t.done).length,prev.dn);
  animCount(document.getElementById('sPn'),mine.filter(t=>!t.done).length,prev.pn);
  animCount(document.getElementById('sOv'),ov,prev.ov);
}

/* ── Relative date helper ── */
function relDate(dateStr){
  if(!dateStr)return'';
  try{
    const d=new Date(dateStr+'T00:00:00');
    const today=new Date();today.setHours(0,0,0,0);
    const diff=Math.round((d-today)/864e5);
    if(diff===0)return'اليوم';
    if(diff===1)return'غداً';
    if(diff===-1)return'أمس';
    if(diff>1&&diff<=7)return`بعد ${diff} أيام`;
    if(diff<-1&&diff>=-7)return`منذ ${-diff} أيام`;
    return fmtD(dateStr);
  }catch{return fmtD(dateStr);}
}

/* ── Replace fmtD in tags with relDate for upcoming dates ── */
dueB=function(date,done){
  const s=dueS(date,done);
  if(s==='none')return'';
  if(s==='overdue'){const d=Math.ceil((new Date(date)-new Date().setHours(0,0,0,0))/864e5);return`<span class="tag-ov">⚠️ متأخرة ${d<-1?Math.abs(d)+' يوم':''}</span>`;}
  if(s==='today')return'<span class="tag-td">📅 اليوم</span>';
  if(s==='soon'){const d=Math.ceil((new Date(date)-new Date().setHours(0,0,0,0))/864e5);return`<span class="tag-sn">🕐 ${d===1?'غداً':d+' أيام'}</span>`;}
  return`<span class="tag-ok">📅 ${relDate(date)}</span>`;
};

/* ── Swipe-to-complete on executor tasks ── */
(function(){
  let sx=0,sy=0,el=null;
  document.addEventListener('touchstart',e=>{
    const t=e.target.closest('.et-m');
    if(!t)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
    el=t.closest('.et');
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!el||!sx)return;
    const dx=e.touches[0].clientX-sx;
    const dy=Math.abs(e.touches[0].clientY-sy);
    if(dy>Math.abs(dx)){el=null;return;} // vertical scroll wins
    if(dx>8&&dx<90){
      el.style.transform=`translateX(${dx*.35}px)`;
      el.style.opacity=String(1-dx*0.003);
    }
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!el)return;
    const dx=e.changedTouches[0].clientX-sx;
    el.style.transform='';el.style.opacity='1';el.style.transition='transform .3s,opacity .3s';
    setTimeout(()=>{if(el){el.style.transition='';el.style.opacity='';}},300);
    if(dx>60){
      // Extract task id from el id (et_ID)
      const id=parseInt(el.id?.replace('et_',''));
      if(id&&!isNaN(id)){const t=D.tasks.find(x=>x.id===id);if(t&&!t.done)tog(id);}
    }
    el=null;sx=0;sy=0;
  },{passive:true});
})();

/* ── Ripple effect on buttons ── */
function addRipple(btn,cx,cy){
  const r=document.createElement('span');
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  const x=cx!=null?cx-rect.left-size/2:rect.width/2-size/2;
  const y=cy!=null?cy-rect.top-size/2:rect.height/2-size/2;
  r.style.cssText=`position:absolute;width:${size}px;height:${size}px;border-radius:50%;background:rgba(255,255,255,.18);transform:scale(0);left:${x}px;top:${y}px;pointer-events:none;animation:ripple .55s ease`;
  btn.style.position='relative';btn.style.overflow='hidden';
  btn.appendChild(r);
  setTimeout(()=>r.remove(),560);
}
document.addEventListener('click',e=>{
  const btn=e.target.closest('.add-btn,.btn-p,.bkb,.ra-ok,.cmt-sub,.ent-btn,.ppb');
  if(btn)addRipple(btn,e.clientX,e.clientY);
});

}

/* ── Enhanced tog: confetti + all-done check ── */
const _baseTog=tog;
tog=function(id){
  const t=D.tasks.find(x=>x.id===id);if(!t)return;
  const wasDone=t.done;
  // Capture position BEFORE renderApp re-creates the DOM
  const el=document.getElementById('tc_'+id)||document.getElementById('et_'+id);
  const rect=el?el.getBoundingClientRect():null;
  _baseTog(id);
  if(!wasDone){
    if(rect&&rect.width>0)confetti(rect.left+rect.width*.5,rect.top+rect.height*.5);
    hap([20,10,20]);
    checkAllDone();
  }
};
